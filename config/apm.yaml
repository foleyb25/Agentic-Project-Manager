# AgenticProjectManager configuration — TEMPLATE (untailored).
# Run /tailor in Claude Code: it reads ../SPEC.md and fills this file in,
# generating agents/roles/*.md to match. See .claude/skills/tailor/SKILL.md.

tailored: false

project:
  name: "(untailored project)"
  root: ".."                    # project root, relative to this repo
  spec: "SPEC.md"               # program spec, relative to project root
  active_version_spec: null     # e.g. SPECS/SPEC_V0.md
  workspace: null               # where the product source lives, e.g. app/
  conventions: null             # shared conventions doc, e.g. CONTRIBUTING.md

runner:
  engine: cli                   # cli (wraps `claude -p`) | sdk (claude-agent-sdk)
  pm_model: null                # null = session default
  consult_model: null           # cheaper model for consultations (cost lever)
  max_turns: 150
  consult_max_turns: 40
  max_budget_usd: 10            # hard per-run ceiling (cli engine)

ledger:
  backend: supabase             # supabase | jsonfile
  jsonfile_path: ".apm/ledger.json"

# --- Everything below is generated by /tailor ---

roles: []
