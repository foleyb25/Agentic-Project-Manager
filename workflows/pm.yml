# PM agent workflow — copy into YOUR PROJECT repo at .github/workflows/pm.yml
# (the project that contains AgenticProjectManager as a submodule).
#
# Secrets: ANTHROPIC_API_KEY, GITHUB_MCP_TOKEN (a PAT with issues read/write —
# the hosted GitHub MCP does NOT accept the Actions GITHUB_TOKEN),
# SUPABASE_ACCESS_TOKEN (management PAT) + SUPABASE_PROJECT_REF.
#
# The PM is the main Claude Code process running the plugin's /pm-run skill;
# role agents, hooks, and MCP servers all load from the plugin directory.
# Comment bodies are never interpolated into the prompt (the PM fetches them
# by id through the GitHub MCP) — avoids prompt/shell injection.

name: pm-agent

on:
  schedule:
    - cron: "17 7 * * *" # nightly full loop
  issue_comment:
    types: [created, edited] # edited → content-hash re-analysis path
  workflow_dispatch:
    inputs:
      focus:
        description: "Optional focus note for this run"
        required: false
        default: ""

# Two PM runs never overlap; a queued run still executes (cursor makes it cheap)
concurrency:
  group: pm-agent
  cancel-in-progress: false

permissions:
  contents: read
  issues: write # only used if a skill falls back to gh; MCP writes use the PAT

jobs:
  pm:
    # Event runs only fire for human @pm mentions; nightly sweep catches the rest
    if: >-
      github.event_name != 'issue_comment' ||
      (contains(github.event.comment.body, '@pm') &&
       github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # pulls the pinned AgenticProjectManager (+ nested)
          lfs: false # consultations read code, not binary assets
          fetch-depth: 1

      - name: PM run
        uses: anthropics/claude-code-action@v1
        env:
          GITHUB_MCP_TOKEN: ${{ secrets.GITHUB_MCP_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: >-
            /pm-run
            ${{ github.event_name == 'schedule' && 'schedule' || github.event_name }}
            pm-${{ github.run_id }}
            comment_id:${{ github.event.comment.id || '' }}
            focus:${{ inputs.focus || '' }}
          # Guardrails: scoped allowlist, turn cap, hard cost ceiling.
          claude_args: |
            --plugin-dir AgenticProjectManager
            --allowedTools "Task,Read,Grep,Glob,Write,WebFetch,WebSearch,mcp__github,mcp__supabase"
            --max-turns 150
            --max-budget-usd 10
